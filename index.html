<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FAIL NEWS</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Playfair+Display:ital,wght@0,400;1,700&display=swap');

  :root {
    --bg: #0a0a0f;
    --green: #00ff88;
    --amber: #ffb300;
    --red: #ff3366;
    --white: #f0f0f0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--white);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
    cursor: crosshair;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 2px,
      rgba(0,255,136,0.015) 2px, rgba(0,255,136,0.015) 4px
    );
    pointer-events: none;
    z-index: 1;
  }

  canvas { position: fixed; inset: 0; z-index: 0; }

  .stage {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem;
  }

  .header { text-align: center; margin-bottom: 3rem; }

  .glitch-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.5rem, 8vw, 5.5rem);
    font-style: italic;
    font-weight: 700;
    color: var(--white);
    position: relative;
    display: inline-block;
    line-height: 1;
  }

  .glitch-title::before, .glitch-title::after {
    content: attr(data-text);
    position: absolute; inset: 0;
  }

  .glitch-title::before {
    color: var(--red);
    animation: glitch1 3.5s infinite;
    clip-path: polygon(0 0, 100% 0, 100% 35%, 0 35%);
  }

  .glitch-title::after {
    color: var(--green);
    animation: glitch2 3.5s infinite;
    clip-path: polygon(0 65%, 100% 65%, 100% 100%, 0 100%);
  }

  @keyframes glitch1 {
    0%,90%,100% { transform: translate(0); opacity: 0; }
    92% { transform: translate(-4px, 2px); opacity: 1; }
    94% { transform: translate(4px,-2px); opacity: 1; }
    96% { transform: translate(-2px,0); opacity: 1; }
    98% { transform: translate(0); opacity: 0; }
  }

  @keyframes glitch2 {
    0%,90%,100% { transform: translate(0); opacity: 0; }
    93% { transform: translate(4px,-1px); opacity: 1; }
    95% { transform: translate(-3px,2px); opacity: 1; }
    97% { transform: translate(1px,0); opacity: 1; }
    99% { transform: translate(0); opacity: 0; }
  }

  .subtitle {
    font-size: 0.75rem;
    color: var(--green);
    letter-spacing: 0.35em;
    text-transform: uppercase;
    margin-top: 0.75rem;
    opacity: 0.7;
  }

  /* GRID — cada celda es un .card-wrapper */
  .bugs-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 1.5rem;
    max-width: 900px;
    width: 100%;
    margin-bottom: 2.5rem;
  }

  /* Wrapper: apila tarjeta + botón en columna */
  .card-wrapper {
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .bug-card {
    background: rgba(255,255,255,0.02);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 4px 4px 0 0;
    padding: 1.5rem;
    position: relative;
    overflow: hidden;
    transition: transform 0.2s, border-color 0.3s;
    cursor: pointer;
    flex: 1;
  }

  /* Sin link → bordes redondeados completos */
  .card-wrapper.no-link .bug-card {
    border-radius: 4px;
  }

  .bug-card::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, var(--card-color, var(--green)) 0%, transparent 60%);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .bug-card:hover::before { opacity: 0.06; }
  .bug-card:hover { border-color: var(--card-color, var(--green)); transform: translateY(-2px); }
  .bug-card.revealed { border-color: var(--card-color, var(--green)); background: rgba(0,255,136,0.04); }
  .bug-card.revealed::before { opacity: 0.08; }

  .card-status {
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 0.75rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--card-color, var(--red));
    animation: blink 1.5s infinite;
  }

  .bug-card.revealed .status-dot { animation: none; background: var(--green); }

.card-link-btn::before{
content:"SYSTEM ACCESS ";
opacity:.4;
margin-right:6px;
}
  @keyframes blink {
    0%,100% { opacity: 1; }
    50% { opacity: 0.2; }
  }

  .bug-name {
    font-family: 'Playfair Display', serif;
    font-size: 1.15rem;
    font-style: italic;
    color: var(--white);
    margin-bottom: 0.5rem;
    line-height: 1.3;
  }

  .bug-code {
    font-size: 0.65rem;
    color: var(--amber);
    opacity: 0.6;
    margin-bottom: 1rem;
  }

  .bug-desc {
    font-size: 0.75rem;
    line-height: 1.7;
    opacity: 0.5;
    display: none;
  }

  .bug-card.revealed .bug-desc { display: block; opacity: 0.7; }

  /* ── BOTÓN POR TARJETA: hermano del .bug-card, nunca hijo ── */
  .card-link-btn {
    display: none;
    width: 100%;
    background: transparent;
    border: 1px solid var(--card-color, var(--green));
    border-top: none;
    border-radius: 0 0 4px 4px;
    color: var(--card-color, var(--green));
    font-family: 'Space Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    padding: 10px 16px;
    cursor: pointer;
    text-align: left;
    transition: background 0.2s, color 0.2s;
    animation: slideDown 0.25s ease;
  }

  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-4px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card-link-btn:hover {
    background: var(--card-color, var(--green));
    color: var(--bg);
  }

  /* Solo aparece cuando la tarjeta está revealed Y tiene link */
  .card-wrapper.has-link .bug-card.revealed ~ .card-link-btn {
    display: block;
  }

  /* CHAOS */
  .chaos-zone { text-align: center; margin-bottom: 2rem; }

  .chaos-btn {
    background: transparent;
    border: 1px solid var(--red);
    color: var(--red);
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    padding: 0.75rem 2rem;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: color 0.3s;
  }

  .chaos-btn::before {
    content: '';
    position: absolute; inset: 0;
    background: var(--red);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.3s;
    z-index: -1;
  }

  .chaos-btn:hover { color: var(--bg); }
  .chaos-btn:hover::before { transform: scaleX(1); }

  .counter {
    font-size: 0.65rem;
    color: var(--green);
    letter-spacing: 0.2em;
    opacity: 0.5;
    margin-top: 0.5rem;
  }

  .footer-quote {
    margin-top: 2rem;
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 0.9rem;
    color: var(--white);
    opacity: 0.25;
    text-align: center;
    max-width: 480px;
  }

  body.chaos .glitch-title { animation: shake 0.1s infinite; }

  @keyframes shake {
    0% { transform: translate(0,0) rotate(0deg); }
    25% { transform: translate(-2px,1px) rotate(-0.5deg); }
    50% { transform: translate(2px,-1px) rotate(0.5deg); }
    75% { transform: translate(-1px,2px) rotate(-0.3deg); }
  }

  body.chaos .bug-card { animation: cardShake 0.15s infinite; }

  @keyframes cardShake {
    0%,100% { transform: translate(0,0); }
    33% { transform: translate(1px,-1px); }
    66% { transform: translate(-1px,1px); }
  }

  .chaos-message {
    font-size: 0.7rem;
    color: var(--amber);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    opacity: 0;
    transition: opacity 0.3s;
    margin-top: 0.5rem;
  }
  .chaos-message.visible { opacity: 1; }

.hidden-btn{
  opacity:0;
  pointer-events:none;
  margin-top:20px;
  padding:10px 20px;
  background:#111;
  color:#00ffcc;
  border:1px solid #00ffcc;
  cursor:pointer;
  transition:all 0.6s ease;
}

.hidden-btn.show{
  opacity:1;
  pointer-events:auto;
}
</style>
</head>
<body>

<canvas id="c"></canvas>

<div class="stage">

  <div class="header">
    <div class="glitch-title" data-text="Fail News">Fail News</div>
    <div class="subtitle">Transmisiones del sistema. Eventos, anomalias y rumores detectados en la red. Lee bajo tu propio riesgo.</div>
  </div>

  <div class="bugs-grid" id="grid"></div>

  <div class="chaos-zone">
    <button class="chaos-btn" id="chaosBtn">⚡ DESCUBRE UNA FALLA</button>
    <div class="chaos-message" id="chaosMsg">// error inesperado... o ¿feature?</div>
    <div class="counter" id="counter">0 / 6 bugs revelados</div>
  </div>

<!--botón secreto-->
<button id="secret-btn" class="hidden-btn">
→ Acceder al portal
</button>

  <div class="footer-quote">
    "El sistema humano sigue fallando."
    SYSTEM LOG · hub.uplink.status : unstable · monitoring anomalies since 2025
  </div>

</div>

<script>
// ── CANVAS ────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, particles = [];

function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

class Particle {
  constructor() { this.reset(); }
  reset() {
    this.x = Math.random() * W; this.y = Math.random() * H;
    this.size = Math.random() * 1.5 + 0.3;
    this.speedY = -(Math.random() * 0.4 + 0.1);
    this.speedX = (Math.random() - 0.5) * 0.2;
    this.opacity = Math.random() * 0.4 + 0.1;
    this.color = Math.random() > 0.7 ? '#ffb300' : '#00ff88';
  }
  update() {
    this.y += this.speedY; this.x += this.speedX; this.opacity -= 0.001;
    if (this.y < 0 || this.opacity <= 0) this.reset();
  }
  draw() {
    ctx.globalAlpha = this.opacity;
    ctx.fillStyle = this.color;
    ctx.fillRect(this.x, this.y, this.size, this.size);
  }
}
for (let i = 0; i < 120; i++) particles.push(new Particle());

let codeLines = [];
const chars = '01アイウエオ{};()=>!null';
class CodeLine {
  constructor() { this.reset(); }
  reset() {
    this.x = Math.random() * W; this.y = -20;
    this.speed = Math.random() * 1.5 + 0.5;
    this.chars = Array.from({length: Math.floor(Math.random()*6+3)},
      () => chars[Math.floor(Math.random()*chars.length)]).join('');
    this.opacity = Math.random() * 0.08 + 0.02;
    this.size = Math.random() * 8 + 7;
  }
  update() { this.y += this.speed; if (this.y > H + 50) this.reset(); }
  draw() {
    ctx.globalAlpha = this.opacity;
    ctx.fillStyle = '#00ff88';
    ctx.font = `${this.size}px "Space Mono", monospace`;
    ctx.fillText(this.chars, this.x, this.y);
  }
}
for (let i = 0; i < 30; i++) { const cl = new CodeLine(); cl.y = Math.random() * H; codeLines.push(cl); }

function animate() {
  ctx.clearRect(0, 0, W, H); ctx.globalAlpha = 1;
  ctx.strokeStyle = 'rgba(0,255,136,0.03)'; ctx.lineWidth = 1;
  for (let x = 0; x < W; x += 60) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for (let y = 0; y < H; y += 60) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }
  particles.forEach(p => { p.update(); p.draw(); });
  codeLines.forEach(cl => { cl.update(); cl.draw(); });
  ctx.globalAlpha = 1;
  requestAnimationFrame(animate);
}
animate();

// ── DATA ──────────────────────────────────────────────────────────
const bugs = [
  { code:'ERR_0001 ::Actualizaciones del sistema', name:'Nuevo módulo detectado.', color:'#00ff88', feature:'→ Portal de aliados', link:'https://baphomet1984.github.io/alliados/', desc:'Nombre: Portal de Aliados. Estado: activo.' },
  { code:'ERR_0002 :: Reportes de visitantes', name:'Actividad inusual detectada.', color:'#ff3366', feature:'→ Investigando…', link:'#', desc:'Países conectados hoy: México, Brasil, Alemania.' },
  { code:'ERR_0003 ::Rumores del sistema', name:'Usuarios reportan una versión del hub que no aparece en el menú.', color:'#ffb300', feature:'→ El sistema no confirma ni niega', link:'#', desc:'Se dice que aparece solo después de las 3:33 AM.' },
  { code:'ERR_0004 ::Noticias del ecosistema', name:'El algoritmo volvió a cambiar', color:'#00ff88', feature:'→ Resultado: nadie lo entiende', link:'#', desc:'Miles de creadores intentando entenderlo.' },
  { code:'ERR_0005 ::Alertas del sistema', name:'Intento de acceso detectado.', color:'#ff3366', feature:'→ Acceso bloqueado', link:'#', desc:'Origen desconocido. El gate respondió correctamente.' },
  { code:'ERR_0006 ::Puebla', name:'Puebla encabeza las muertes por influenza en México durante 2026.', color:'#ffb300', feature:'→ Moraleja del sistema', link:'#', desc:'29 fallecimientos y más de 14 mil consultas médicas.' }
];

// ── CARDS ─────────────────────────────────────────────────────────
const grid = document.getElementById('grid');
let revealed = 0;

bugs.forEach(bug => {
  const hasLink = bug.link && bug.link !== '#';

  // Wrapper que agrupa tarjeta + botón
  const wrapper = document.createElement('div');
  wrapper.className = 'card-wrapper' + (hasLink ? ' has-link' : ' no-link');

  // Tarjeta
  const card = document.createElement('div');
  card.className = 'bug-card';
  card.style.setProperty('--card-color', bug.color);
  card.innerHTML = `
    <div class="card-status">
      <span class="status-dot"></span>
      <span style="opacity:0.4;color:${bug.color}">BUG</span>
    </div>
    <div class="bug-code">${bug.code}</div>
    <div class="bug-name">${bug.name}</div>
    <div class="bug-desc">${bug.desc}</div>
  `;

  // Botón — hermano de la tarjeta, NO hijo
  const btn = document.createElement('button');
  btn.className = 'card-link-btn';
  btn.style.setProperty('--card-color', bug.color);
  btn.textContent = bug.feature;

  // Click tarjeta → solo revela
  card.addEventListener('click', function() {
    if (!card.classList.contains('revealed')) {
      card.classList.add('revealed');
      card.querySelector('.card-status span:last-child').textContent = 'REGISTERED';
      revealed++;
      document.getElementById('counter').textContent = `${revealed} / ${bugs.length} bugs revelados`;
    }
<!--boton secreto-->
if (revealed === 6) {

  const secretBtn = document.getElementById("secret-btn");

  secretBtn.classList.add("show");

}
document.getElementById("secret-btn").addEventListener("click", () => {

  window.location.href = "https://baphomet1984.github.io/systemtag/gate/?lvl=unlkd&go=signal-unlkd";

});
  });

  // Click botón → solo navega (evento completamente separado)
  btn.addEventListener('click', function() {
    window.location.href = bug.link;
  });

  card.addEventListener('mouseenter', () => {
    for (let i = 0; i < 8; i++) {
      const p = particles[Math.floor(Math.random() * particles.length)];
      p.speedY = -2; p.opacity = 0.8;
    }
  });

  wrapper.appendChild(card);
  if (hasLink) wrapper.appendChild(btn);
  grid.appendChild(wrapper);
});

// ── CHAOS ─────────────────────────────────────────────────────────
let chaosActive = false;
const chaosBtn = document.getElementById('chaosBtn');
const chaosMsg = document.getElementById('chaosMsg');
const messages = [
  '// segmentation fault (core dumped)',
  '// NullPointerException at line 42',
  '// undefined is not a function',
  '// maximum call stack exceeded',
  '// FATAL: unexpected token }',
  '// cannot read property of undefined',
];
let chaosTimeout;

chaosBtn.addEventListener('click', () => {
  chaosActive = !chaosActive;
  document.body.classList.toggle('chaos', chaosActive);
  chaosMsg.classList.add('visible');
  chaosMsg.textContent = messages[Math.floor(Math.random() * messages.length)];
  clearTimeout(chaosTimeout);
  if (chaosActive) {
    chaosTimeout = setTimeout(() => {
      const unrevealed = [...document.querySelectorAll('.bug-card:not(.revealed)')];
      if (unrevealed.length) {
        unrevealed[Math.floor(Math.random() * unrevealed.length)].click();
        chaosMsg.textContent = '// bug accepted... transforming into feature ✓';
      }
      document.body.classList.remove('chaos');
      chaosActive = false;
      setTimeout(() => chaosMsg.classList.remove('visible'), 2500);
    }, 1500);
  } else {
    setTimeout(() => chaosMsg.classList.remove('visible'), 2000);
  }
});

</script>
</body>
</html>
